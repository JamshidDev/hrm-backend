<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <title>OnlyOffice lokal test client</title>
  <style>
    * { box-sizing: border-box; font-family: system-ui, sans-serif; }
    body { margin: 0; display: flex; flex-direction: column; height: 100vh; }
    #bar { padding: 10px 14px; background: #1f2430; color: #fff; display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
    #bar label { font-size: 11px; display: flex; flex-direction: column; gap: 2px; color: #aeb6c4; }
    #bar input { padding: 6px 8px; border: 1px solid #3a4252; border-radius: 5px; background: #11151d; color: #fff; font-size: 12px; }
    #docUrl { width: 460px; }
    #model { width: 130px; } #docId { width: 90px; } #cbBase, #dsUrl { width: 230px; }
    #bar button { padding: 8px 16px; border: 0; border-radius: 5px; background: #4f8cff; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
    #bar button:hover { background: #3a78f0; }
    #hint { font-size: 11px; color: #7c8597; padding: 4px 14px; background: #161a22; color: #8a93a6; }
    #editor { flex: 1; }
  </style>
</head>
<body>
  <div id="bar">
    <label>DS URL<input id="dsUrl" value="http://localhost:8080" /></label>
    <label>doc_url (show'dan)<input id="docUrl" placeholder="http://host.docker.internal:8001/api/only-office/file/<uuid>?expires=&model=&signature=" /></label>
    <label>model<input id="model" value="commands" /></label>
    <label>document_id<input id="docId" placeholder="123" /></label>
    <label>callback base<input id="cbBase" value="http://host.docker.internal:8001" /></label>
    <button onclick="openEditor()">Editorni och</button>
  </div>
  <div id="hint">
    1) command yarating → 2) <code>GET /api/v1/document/show?model=&id=</code> dan <b>doc_url</b> ni oling →
    3) shu yerga qo'ying → "Editorni och". Saqlash: editor ichida o'zgartiring, DS avto/force-save bilan
    <code>callbackUrl</code> ga yuboradi (status 2/6) → backend MinIO + PDF qiladi.
  </div>
  <div id="editor"></div>

  <script>
    let editor = null;
    let apiLoadedFor = null;

    function loadApi(dsUrl) {
      return new Promise((resolve, reject) => {
        if (apiLoadedFor === dsUrl && window.DocsAPI) return resolve();
        // eski script bo'lsa olib tashlaymiz
        document.querySelectorAll('script[data-oo]').forEach(s => s.remove());
        const s = document.createElement('script');
        s.src = dsUrl.replace(/\/+$/, '') + '/web-apps/apps/api/documents/api.js';
        s.setAttribute('data-oo', '1');
        s.onload = () => { apiLoadedFor = dsUrl; resolve(); };
        s.onerror = () => reject(new Error('api.js yuklanmadi: ' + s.src + '  (DS ishlayaptimi?)'));
        document.head.appendChild(s);
      });
    }

    async function openEditor() {
      const dsUrl = document.getElementById('dsUrl').value.trim();
      const docUrl = document.getElementById('docUrl').value.trim();
      const model = document.getElementById('model').value.trim();
      const docId = document.getElementById('docId').value.trim();
      const cbBase = document.getElementById('cbBase').value.trim().replace(/\/+$/, '');
      if (!docUrl || !model || !docId) { alert('doc_url, model va document_id shart'); return; }

      try { await loadApi(dsUrl); }
      catch (e) { alert(e.message); return; }

      // key — har ochilishda unikal (DS keshini chetlab o'tish uchun).
      const key = (model + '_' + docId + '_' + Date.now()).replace(/[^0-9a-zA-Z._=-]/g, '');
      const callbackUrl = cbBase + '/api/v1/document/update?model=' + encodeURIComponent(model) +
                          '&document_id=' + encodeURIComponent(docId);

      if (editor) { editor.destroyEditor(); editor = null; }

      // Prod frontend bilan bir xil: documentType + fileType + callbackUrl, token YO'Q (JWT off).
      editor = new DocsAPI.DocEditor('editor', {
        documentType: 'word',
        type: 'desktop',
        width: '100%', height: '100%',
        document: {
          fileType: 'docx',
          key: key,
          title: model + '-' + docId + '.docx',
          url: docUrl,
          permissions: { edit: true, download: true, print: true },
        },
        editorConfig: {
          mode: 'edit',
          lang: 'ru',
          callbackUrl: callbackUrl,
          // force-save tugmasi: tahrirni darhol callback'ga yuboradi (status 6).
          customization: { forcesave: true, autosave: true },
        },
        events: {
          onError: (e) => console.error('OO error:', e),
          onDocumentStateChange: (e) => console.log('state change (modified):', e.data),
          onRequestSaveAs: (e) => console.log('saveAs:', e),
        },
      });
      console.log('Editor ochildi. callbackUrl =', callbackUrl, ' doc.url =', docUrl);
    }
  </script>
</body>
</html>
