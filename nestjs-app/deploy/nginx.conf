# Nginx reverse proxy — HRM NestJS (port 8001) uchun.
# /etc/nginx/sites-available/hrm-api ga nusxalang, so'ng:
#   ln -s /etc/nginx/sites-available/hrm-api /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# TLS sertifikat: certbot --nginx -d hrm-api.railway.uz

upstream hrm_nestjs {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 80;
    server_name hrm-api.railway.uz;

    # HTTP -> HTTPS (certbot odatda buni avtomatik qo'shadi)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hrm-api.railway.uz;

    ssl_certificate     /etc/letsencrypt/live/hrm-api.railway.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hrm-api.railway.uz/privkey.pem;

    # E-IMZO code / base64 upload / OnlyOffice callback katta keladi (main.ts'da 50mb).
    client_max_body_size 50m;

    # Socket.io (websocket upgrade)
    location /socket.io/ {
        proxy_pass http://hrm_nestjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
    }

    location / {
        proxy_pass http://hrm_nestjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Export endpointlar uzoq ishlashi mumkin.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
